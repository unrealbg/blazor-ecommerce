services:
  postgres:
    image: postgres:17-alpine
    container_name: blazor-ecommerce-postgres
    environment:
      POSTGRES_DB: blazor_ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blazor_ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10

  directus-db:
    image: postgres:16-alpine
    container_name: blazor-ecommerce-directus-postgres
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    ports:
      - "5444:5432"
    volumes:
      - directus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus -d directus"]
      interval: 5s
      timeout: 3s
      retries: 10

  directus:
    image: directus/directus:11.14.0
    container_name: blazor-ecommerce-directus
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_CLIENT: pg
      DB_HOST: directus-db
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: directus
      WEBSOCKETS_ENABLED: "true"
    ports:
      - "8055:8055"
    volumes:
      - directus-uploads:/directus/uploads
    depends_on:
      directus-db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: blazor-ecommerce-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    container_name: blazor-ecommerce-app
    build:
      context: .
      dockerfile: src/AppHost/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=blazor_ecommerce;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      Outbox__BatchSize: 20
      Outbox__PollingInterval: 00:00:05
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  storefront:
    container_name: blazor-ecommerce-storefront
    build:
      context: .
      dockerfile: src/Storefront/Storefront.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5100
      Api__BaseUrl: http://app:8080
      Cms__BaseUrl: http://directus:8055
      Cms__ApiToken: ""
      ConnectionStrings__Redis: redis:6379
      Site__BaseUrl: http://localhost:5100
    ports:
      - "5100:5100"
    depends_on:
      app:
        condition: service_started
      directus:
        condition: service_started

volumes:
  postgres-data:
  directus-postgres-data:
  directus-uploads:
