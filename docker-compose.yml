services:
  postgres:
    image: postgres:17-alpine
    container_name: blazor-ecommerce-postgres
    environment:
      POSTGRES_DB: blazor_ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blazor_ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10

  directus-db:
    image: postgres:16-alpine
    container_name: blazor-ecommerce-directus-postgres
    environment:
      POSTGRES_DB: directus
      POSTGRES_USER: directus
      POSTGRES_PASSWORD: directus
    ports:
      - "5444:5432"
    volumes:
      - directus-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U directus -d directus"]
      interval: 5s
      timeout: 3s
      retries: 10

  directus:
    image: directus/directus:11.14.0
    container_name: blazor-ecommerce-directus
    environment:
      KEY: ${DIRECTUS_KEY:-local-dev-directus-key}
      SECRET: ${DIRECTUS_SECRET:-local-dev-directus-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      DB_CLIENT: pg
      DB_HOST: directus-db
      DB_PORT: 5432
      DB_DATABASE: directus
      DB_USER: directus
      DB_PASSWORD: directus
      WEBSOCKETS_ENABLED: "true"
    ports:
      - "8055:8055"
    volumes:
      - directus-uploads:/directus/uploads
    depends_on:
      directus-db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: blazor-ecommerce-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    container_name: blazor-ecommerce-app
    build:
      context: .
      dockerfile: src/AppHost/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=blazor_ecommerce;Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379
      Build__ApplicationName: blazor-ecommerce-app
      Build__Version: dev
      Build__SourceRevisionId: local-dev
      Build__BuildTimestampUtc: 2026-03-07T00:00:00Z
      Release__SeedMode: minimal
      Release__MigrationMode: manual
      Release__RunSmokeTestsAfterDeploy: "true"
      FeatureFlags__EnableOperationalRecoveryActions: "true"
      FeatureFlags__EnableDemoProviders: "true"
      FeatureFlags__EnableReviewModeration: "true"
      Observability__ServiceName: blazor-ecommerce-app
      Observability__EnableConsoleExporter: "true"
      Observability__CorrelationHeaderName: X-Correlation-Id
      Readiness__OutboxWarningThreshold: 250
      Readiness__FailedWebhookWarningThreshold: 25
      Readiness__OldestOutboxMinutesThreshold: 15
      Outbox__BatchSize: 20
      Outbox__PollingInterval: 00:00:05
      Outbox__MaxRetryAttempts: 5
      Outbox__RetryBaseDelaySeconds: 15
      Outbox__StuckWarningAgeMinutes: 15
      Retention__ProcessedOutboxDays: 30
      Retention__WebhookPayloadDays: 90
      Retention__AuditLogDays: 3650
      Retention__SweepIntervalMinutes: 60
    ports:
      - "8080:8080"
    volumes:
      - ./.docker/data-protection/app:/home/app/.aspnet/DataProtection-Keys
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  storefront:
    container_name: blazor-ecommerce-storefront
    build:
      context: .
      dockerfile: src/Storefront/Storefront.Web/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 5100
      Api__BaseUrl: http://app:8080
      Cms__BaseUrl: http://directus:8055
      Cms__ApiToken: ""
      Build__ApplicationName: blazor-ecommerce-storefront
      Build__Version: dev
      Build__SourceRevisionId: local-dev
      Build__BuildTimestampUtc: 2026-03-07T00:00:00Z
      Caching__HomePageSeconds: 60
      Caching__CategoryPageSeconds: 30
      Caching__ProductPageSeconds: 45
      Caching__SearchPageSeconds: 15
      Caching__ContentPageSeconds: 300
      FeatureFlags__EnableReviews: "true"
      FeatureFlags__EnableCmsContent: "false"
      FeatureFlags__EnableSearchSuggestions: "true"
      FeatureFlags__EnableWarmup: "true"
      Warmup__Enabled: "true"
      Warmup__TimeoutSeconds: 20
      Warmup__WarmContent: "false"
      ConnectionStrings__Redis: redis:6379
      Site__BaseUrl: http://localhost:5100
    ports:
      - "5100:5100"
    volumes:
      - ./.docker/data-protection/storefront:/home/app/.aspnet/DataProtection-Keys
    depends_on:
      app:
        condition: service_started
      directus:
        condition: service_started

volumes:
  postgres-data:
  directus-postgres-data:
  directus-uploads:
